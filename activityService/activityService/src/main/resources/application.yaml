spring:
  application:
    name: activityService
  data:
    mongodb:
      uri: mongodb://localhost:27017/activityservice
      database: activityservice

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
      enabled=false:
    register-with-eureka: true
    fetch-registry: true

server:
  port: 8082